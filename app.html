<body>

          </h2>
          <p class="cast-overlay__hint m-0 text-md text-soft">
            Playback runs on your Cast device. Controls here will steer the receiver.
          </p>
          <label class="cast-overlay__volume grid gap-6 text-left mt-6">
            <span class="cast-overlay__volume-label text-sm uppercase text-muted">Receiver volume</span>
            <input type="range" min="0" max="100" step="1" value="100" data-role="cast-volume-input"

          </label>
          <button type="button" class="cast-overlay__debug" data-role="cast-debug-toggle" aria-pressed="false">
            Show debug overlay
          </button>
        </div>
      </div>
    </main>
    <footer class="site-footer"></footer>
  </div>

  <script type="module">
    var initializeCastApi = function () {
      let applicationId = 'FD7D29B2'; //def CC1AD845, dev B2B73543,FD7D29B2
      cast.framework.CastContext.getInstance().setOptions({
        receiverApplicationId: applicationId,
        autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
      });
    };
    window['__onGCastApiAvailable'] = function (isAvailable) {
      if (isAvailable) {
        console.log('Cast API is available');
        initializeCastApi();
      }
    };
    const bootstrap = async () => {
      try {
        await import('./scripts/main.min.js');
      } catch (error) {
        await import('./app/main.min.js');
      }
    };
    bootstrap();
  </script>
