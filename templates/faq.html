<template id="tpl-faq">
  <section class="overlay-sheet flex flex-col overflow-hidden" role="dialog" aria-modal="true" aria-labelledby="faq-title">
    <header class="overlay-sheet__header relative flex items-center justify-center px-12 py-8">
      <button class="overlay-link absolute text-sm uppercase cursor-pointer" type="button" data-view="menu" style="left: var(--space-12);">← Back</button>
      <p class="overlay-title m-0 text-sm uppercase text-muted" id="faq-title">FAQ</p>
      <button class="overlay-close absolute flex-center text-sm cursor-pointer transition-transform" type="button" data-action="close" aria-label="Close" style="top: 50%; right: var(--space-12); transform: translateY(-50%);">✕</button>
    </header>
    <div class="overlay-content p-12 pr-8 flex flex-col gap-16 overflow-y-auto">
      <div class="faq-item flex flex-col gap-6 m-0">
        <h3 class="faq-question m-0">Is VVavy free to use?</h3>
        <p class="faq-answer m-0">Yes. VVavy is free to use, with no signup and no credit card required.</p>
      </div>

      <div class="faq-item flex flex-col gap-6 m-0">
        <h3 class="faq-question m-0">What audio formats are supported?</h3>
        <p class="faq-answer m-0">You can use MP3, WAV, OGG, AAC, FLAC, and most common audio formats. You can also stream from SoundCloud, use your microphone, capture tab/system audio, or route external audio live.</p>
      </div>

      <div class="faq-item flex flex-col gap-6 m-0">
        <h3 class="faq-question m-0">Can I export my audio visualizations?</h3>
        <p class="faq-answer m-0">Yes. Export your visuals as high-quality video with multiple resolution and quality options, ready for socials or YouTube.</p>
      </div>

      <div class="faq-item flex flex-col gap-6 m-0">
        <h3 class="faq-question m-0">Does VVavy work without internet?</h3>
        <p class="faq-answer m-0">VVavy needs internet to load. After that, uploaded files can run offline, but SoundCloud streaming still requires a connection.</p>
      </div>

      <div class="faq-item flex flex-col gap-6 m-0">
        <h3 class="faq-question m-0">Can I create custom audio visualizations?</h3>
        <p class="faq-answer m-0">Yes. Build your own audio-reactive visuals in the creator by pasting or writing custom code.</p>
      </div>

      <div class="faq-item flex flex-col gap-6 m-0">
        <h3 class="faq-question m-0">Can I cast VVavy to my TV?</h3>
        <p class="faq-answer m-0">Yes. VVavy supports Google Cast and Chromecast, so you can throw visuals to your TV or smart display in full screen.</p>
      </div>

      <div class="faq-item flex flex-col gap-6 m-0">
        <h3 class="faq-question m-0">How do I share my visualizations?</h3>
        <p class="faq-answer m-0">Export a video or generate a share link from your current setup, then post it anywhere.</p>
      </div>

      <div class="faq-item flex flex-col gap-6 m-0">
        <h3 class="faq-question m-0">What are the system requirements?</h3>
        <p class="faq-answer m-0">VVavy runs in modern browsers on desktop and mobile. For the smoothest performance, use a recent version of Chrome, Firefox, Safari, or Edge.</p>
      </div>

      <div class="faq-item flex flex-col gap-6 m-0">
        <h3 class="faq-question m-0">Can I request new features?</h3>
        <p class="faq-answer m-0">Absolutely. Send feature requests and product ideas to <a href="mailto:feature@vvavy.io">feature@vvavy.io</a>.</p>
      </div>
    </div>
  </section>
</template>
