<template id="tpl-media-source-prompts">
  <div
    class="media-source-prompts absolute z-20 flex items-start justify-center overflow-y-auto overflow-hidden"
    data-role="media-source-prompts"
  >
    <div class="media-source-prompts__backdrop absolute inset-0" data-role="media-source-prompts-backdrop" aria-hidden="true"></div>
    <section
      class="media-source-prompts__sheet relative z-10 flex w-full flex-col"
      data-role="media-source-prompts-sheet"
      aria-label="Choose media sources"
    >
      <div class="media-source-prompts__handle self-center" aria-hidden="true"></div>
      <div class="media-source-prompts__topbar flex items-start justify-between gap-12">
        <div class="media-source-prompts__copy flex flex-col gap-4">
          <p class="media-source-prompts__eyebrow m-0 text-xs uppercase text-muted">Source Setup</p>
          <p class="media-source-prompts__title m-0">Choose audio, video, or both.</p>
        </div>
        <button
          class="media-source-prompts__close overlay-close flex-center text-sm cursor-pointer transition-transform"
          type="button"
          data-role="media-source-prompts-close"
          aria-label="Close source setup"
        >✕</button>
      </div>
      <div
        class="media-source-prompts__tabs flex items-center gap-8"
        data-role="media-source-prompts-tabs"
        hidden
      >
        <button
          class="media-source-prompts__tab overlay-menu__button px-10 py-8 text-sm uppercase cursor-pointer"
          type="button"
          data-panel="video-source-prompt"
          data-role="media-source-prompts-tab"
        >Video</button>
        <button
          class="media-source-prompts__tab overlay-menu__button px-10 py-8 text-sm uppercase cursor-pointer"
          type="button"
          data-panel="audio-source-prompt"
          data-role="media-source-prompts-tab"
        >Audio</button>
      </div>
      <div class="media-source-prompts__rack flex w-full flex-wrap items-stretch justify-center" data-role="media-source-prompts-rack"></div>
    </section>
  </div>
</template>

<template id="tpl-video-source-prompt">
  <section
    class="media-source-prompt media-source-prompt--video flex w-full flex-col gap-12 p-16"
    data-role="video-source-prompt"
    aria-label="Choose a video source"
  >
    <p class="media-source-prompt__heading m-0 text-center text-xs uppercase text-muted">Choose a video source</p>
    <div class="flex flex-col gap-6">
      <button
        class="overlay-menu__button overlay-menu__button--icon media-source-prompt__button w-full flex items-center justify-start gap-10 px-10 py-8 text-sm cursor-pointer"
        type="button"
        data-vsp-action="tab-both"
        data-capability="display-capture"
      >
        <svg class="overlay-menu__icon" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="2" y="3" width="20" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.8" />
          <path d="M8 21h8M12 17v4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          <path d="M10 8l5 3-5 3V8z" fill="currentColor" stroke="none" />
        </svg>
        <span class="overlay-menu__label media-source-prompt__label flex flex-col items-start gap-2">
          <span class="media-source-prompt__title">System audio/video</span>
          <span class="media-source-prompt__meta">Captures audio + video together</span>
        </span>
      </button>
      <button
        class="overlay-menu__button overlay-menu__button--icon media-source-prompt__button w-full flex items-center justify-start gap-10 px-10 py-8 text-sm cursor-pointer"
        type="button"
        data-vsp-action="tab-video"
        data-capability="display-capture"

      </button>
      <button
        class="overlay-menu__button overlay-menu__button--icon media-source-prompt__button w-full flex items-center justify-start gap-10 px-10 py-8 text-sm cursor-pointer"
        type="button"
        data-vsp-action="webcam"
        data-capability="user-media"
      >
        <svg class="overlay-menu__icon" viewBox="0 0 24 24" aria-hidden="true">

        <span class="overlay-menu__label media-source-prompt__label flex flex-col items-start gap-2">
          <span class="media-source-prompt__title">Webcam Live Feed</span>
          <span class="media-source-prompt__meta">Low-latency camera input</span>
        </span>
      </button>
      <button
        class="overlay-menu__button overlay-menu__button--icon media-source-prompt__button w-full flex items-center justify-start gap-10 px-10 py-8 text-sm cursor-pointer"
        type="button"
        data-vsp-action="file"
      >
        <svg class="overlay-menu__icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />

        </svg>
        <span class="overlay-menu__label media-source-prompt__label flex flex-col items-start gap-2">
          <span class="media-source-prompt__title">Upload Video File</span>
          <span class="media-source-prompt__meta">MP4, WebM…</span>
        </span>
      </button>
      <button
        class="overlay-menu__button overlay-menu__button--icon media-source-prompt__button w-full flex items-center justify-start gap-10 px-10 py-8 text-sm cursor-pointer"
        type="button"
        data-vsp-action="image"
      >
        <svg class="overlay-menu__icon" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="4" width="18" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="1.8" />
          <circle cx="9" cy="9" r="1.6" fill="currentColor" stroke="none" />

          <span class="media-source-prompt__title">Upload Static Image</span>
          <span class="media-source-prompt__meta">PNG, JPG, WebP…</span>
        </span>
      </button>
      <button
        class="overlay-menu__button overlay-menu__button--icon media-source-prompt__button w-full flex items-center justify-start gap-10 px-10 py-8 text-sm cursor-pointer"
        type="button"
        data-vsp-action="library"

        <svg class="overlay-menu__icon" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="2" y="3" width="20" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.8" />
          <path d="M8 21h8M12 17v4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />

          <span class="media-source-prompt__title">Video Library</span>

    </div>
    <p class="media-source-prompt__hint m-0 text-center text-xs text-soft" data-role="media-source-prompt-hint"></p>
  </section>
</template>
