<template id="tpl-visual-controls">
  <div class="effects-panel-shell flex flex-col overflow-hidden" role="dialog" aria-label="Visual Effects Controls">
    <div class="effects-panel-header relative flex items-center px-12 py-8" data-role="effects-drag-handle">
      <p class="overlay-title m-0 text-sm uppercase text-muted">Effects</p>
      <button class="overlay-close absolute flex-center text-sm cursor-pointer transition-transform" type="button" data-action="effects-close" aria-label="Close effects panel" style="top: 50%; right: var(--space-12); transform: translateY(-50%);">✕</button>
    </div>
    <div class="effects-panel-body p-12 flex flex-col gap-16">

      <div class="visual-control-group flex flex-col gap-8">
        <div class="flex items-center justify-between">
          <label class="visual-control-label text-sm uppercase text-muted" for="vc-tint">Color</label>
          <span class="visual-control-value text-sm uppercase" data-role="vc-tint-value">Off</span>
        </div>
        <label class="visual-control-color-field flex items-center gap-12" for="vc-tint">
          <input
            class="visual-control-color-picker cursor-pointer"
            id="vc-tint"
            type="color"
            value="#ffffff"
            data-role="vc-tint"
            aria-label="Visual tint color"
          />
          <span class="visual-control-color-copy text-sm text-soft">Pick an exact tint for the stage output.</span>
        </label>
        <p class="visual-control-hint m-0 text-soft" style="font-size: var(--font-size-xs);">
          Applies a color tint to the visual output.
        </p>
      </div>

      <div class="visual-control-group flex flex-col gap-8">
        <div class="flex items-center justify-between">
          <label class="visual-control-label text-sm uppercase text-muted" for="vc-saturation">Saturation</label>
          <span class="visual-control-value text-sm" data-role="vc-saturation-value">1.0x</span>
        </div>
        <input
          class="visual-control-slider w-full cursor-pointer"
          id="vc-saturation"
          type="range"
          min="0"
          max="2.0"
          step="0.05"
          value="1.0"
          data-role="vc-saturation"
          aria-label="Color saturation"
        />
      </div>

      <div class="visual-control-group flex flex-col gap-8">
        <div class="flex items-center justify-between">
          <label class="visual-control-label text-sm uppercase text-muted" for="vc-brightness">Brightness</label>
          <span class="visual-control-value text-sm" data-role="vc-brightness-value">1.00x</span>
        </div>
        <input
          class="visual-control-slider w-full cursor-pointer"
          id="vc-brightness"
          type="range"
          min="0"
          max="3.0"
          step="0.05"
          value="1.0"
          data-role="vc-brightness"
          aria-label="Visual brightness"
        />
      </div>

      <div class="visual-control-group flex flex-col gap-8">
        <div class="flex items-center justify-between">
          <label class="visual-control-label text-sm uppercase text-muted" for="vc-sensitivity">Sensitivity</label>
          <span class="visual-control-value text-sm" data-role="vc-sensitivity-value">1.00x</span>
        </div>
        <input
          class="visual-control-slider w-full cursor-pointer"
          id="vc-sensitivity"
          type="range"
          min="0.1"
          max="3.0"
          step="0.05"
          value="1.0"
          data-role="vc-sensitivity"
          aria-label="Global audio sensitivity"
        />
        <p class="visual-control-hint m-0 text-soft" style="font-size: var(--font-size-xs);">
          Scales all audio reactivity uniformly across every visual.
        </p>
      </div>

      <div class="visual-control-group flex flex-col gap-8">
        <p class="visual-control-label text-sm uppercase text-muted m-0">Per-Metric Sensitivity</p>

        <div class="flex flex-col gap-8">

          <div class="flex flex-col gap-4">
            <div class="flex items-center justify-between">
              <label class="visual-control-label text-sm text-muted" for="vc-metric-energy">Energy</label>
              <span class="visual-control-value text-sm" data-role="vc-metric-energy-value">1.00x</span>
            </div>
            <input class="visual-control-slider w-full cursor-pointer" id="vc-metric-energy" type="range" min="0.1" max="3.0" step="0.05" value="1.0" data-role="vc-metric-energy" aria-label="Energy sensitivity" />
          </div>

          <div class="flex flex-col gap-4">
            <div class="flex items-center justify-between">
              <label class="visual-control-label text-sm text-muted" for="vc-metric-centroid">Centroid</label>
              <span class="visual-control-value text-sm" data-role="vc-metric-centroid-value">1.00x</span>
            </div>
            <input class="visual-control-slider w-full cursor-pointer" id="vc-metric-centroid" type="range" min="0.1" max="3.0" step="0.05" value="1.0" data-role="vc-metric-centroid" aria-label="Spectral centroid sensitivity" />
          </div>

        </div>
      </div>

      <button
        class="visual-control-reset w-full py-8 px-10 text-sm uppercase cursor-pointer"
        type="button"
        data-role="vc-reset"
      >
        Reset to defaults
      </button>

    </div>
  </div>
</template>
